<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualitätskontrolle Markus</title>
    
    <!-- Moderne Schriftart laden -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CSS verlinken -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- JavaScript verlinken (defer sorgt dafür, dass es erst nach dem HTML lädt) -->
    <script src="script.js" defer></script>
</head>
<body>

    <main class="card">
        <header>
            <h1>Qualitätskontrolle: Markus 🍆</h1>
            <p>Deine ehrliche, anonyme Bewertung hilft uns, die Performance in Zukunft zu optimieren.</p>
        </header>

        <form id="survey-form">
            <div class="input-group">
                <label for="laenge">Wie lang war er? (in cm)</label>
                <input type="number" id="laenge" placeholder="Bitte ehrliche Angaben..." required>
            </div>

            <div class="input-group">
                <label for="dauer">Wie fandest du es zeitlich?</label>
                <input type="range" id="dauer" min="0" max="100" value="50">
                
                <div class="slider-labels">
                    <span>2 Stöße</span>
                    <span id="slider-value-text" class="highlight">Genau richtig</span>
                    <span>Eingeschlafen</span>
                </div>
            </div>

            <div class="input-group">
                <label for="kommentar">Konstruktives Feedback:</label>
                <textarea id="kommentar" rows="3" placeholder="z.B. 'Könnte beim Vorspiel weniger über Autos reden...'"></textarea>
            </div>

            <button type="submit" id="submit-btn">
                <span id="btn-text">Bewertung abschicken</span>
                <span id="btn-spinner" class="hidden">Lädt...</span>
            </button>
        </form>

        <div id="success-msg" class="hidden">
            <h2>Vielen Dank! 🥳</h2>
            <p>Deine Daten wurden anonym an das Dashboard übermittelt. Markus wird sich (vielleicht) über das Feedback freuen!</p>
        </div>
    </main>

</body>
</html>
